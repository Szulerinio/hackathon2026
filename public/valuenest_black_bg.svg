<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ValueNest Real Estate CRM logo</title>
  <desc id="desc">Gold house growth icon with white ValueNest wordmark and muted subtitle, optimized for black backgrounds.</desc>

  <rect width="760" height="220" rx="28" fill="#050607"/>

  <!-- Icon -->
  <g transform="translate(54 39)" stroke="#C9AC55" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- house outline + chart line -->
    <path d="M18 80 V47 L68 8 L118 47 V78"/>
    <path d="M18 80 V132 L50 107 L82 122 L122 80"/>
    <path d="M92 80 H122 V110"/>
    <!-- window -->
    <path d="M52 50 H64 V62 H52 Z" fill="#C9AC55" stroke="none"/>
    <path d="M75 50 H87 V62 H75 Z" fill="#C9AC55" stroke="none"/>
    <path d="M52 73 H64 V85 H52 Z" fill="#C9AC55" stroke="none"/>
    <path d="M75 73 H87 V85 H75 Z" fill="#C9AC55" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text x="210" y="100" fill="#F7FAFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="750" letter-spacing="-2.2">ValueNest</text>
  <text x="214" y="145" fill="#9CA3AF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="400" letter-spacing="1.5">Real Estate CRM</text>
</svg>
